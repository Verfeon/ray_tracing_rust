name: convert PPM to PNG

on: [push]

permissions: 
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps: 
      - uses: actions/checkout@v4

      - name: Install ImageMagick
        run: sudo apt-get install imagemagick
      
      - name: Convert images
        run: |
          mkdir -p images
          for f in images/*.ppm; do
            [ -e "$f" ] || continue
            base=$(basename "$f" .ppm)
            convert "$f" "images/$base.png"
          done
        
      - name: Commit PNGs
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add images/*.png
          git commit -m "Auto convert PPM -> PNG" || true
          git push origin HEAD
